<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="icon" href="./favicon.ico">

    <style>
        /* ===== TOGGLE ===== */
        #toggle {
            display: none;
        }

        /* ===== BODY ===== */
        body {
            font-family: Arial, sans-serif;
            background-image: url(https://i.pinimg.com/originals/66/ad/8a/66ad8a8b3cf59cee451e53ec45ad76c3.gif);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            transition: .4s;
           
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-weight: bold;
        }

        /* toggle button */
        .toggle-label {
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            background: #4e4d86ee;
            color: white;
        }

        .toggle-label::after {
            content: "🌙 Dark Mode";
        }

        #toggle:checked~header .toggle-label::after {
            content: "☀ Light Mode";
        }

        /* ===== MAIN ===== */
        main {
            max-width: 1100px;
            margin: 60px auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* ===== CARD ===== */
        .card {
            background: rgba(63, 129, 173, 0.39);
            padding: 30px;
            border-style: inset;
            border-width: 10px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            transition: .4s;
        }

        h2 {
            text-align: center;
        }

        /* ===== FORM ===== */
        label {
            display: block;
            margin-top: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
        }

        textarea {
            resize: none;
        }

        /* FIRST & LAST FIX */
        .row {
            display: flex;
            gap: 25px;
            /* may pagitan na */
        }

        .row div {
            flex: 1;
        }

        /* RADIO FIX */
        .radio-group {
            display: flex;
            flex-direction: center;
            gap: 20px;
            margin-top: 9px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            white-space: nowrap;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            margin: 0;
        }

        /* CHECKBOX FIX */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            /* Reduced gap to make checkbox and text closer */
            margin-top: 15px;
            margin-left: 90px;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 16px;
            height: 16px;
        }

        .checkbox-group label {
            margin: 0;
            line-height: 1;
            cursor: pointer;
        }


        /* COLOR BOX */
        input[type="color"] {
            height: 45px;
            padding: 3px;
            cursor: pointer;
        }

        /* BUTTONS */
        .btns {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #4e4d86cb;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background-color: rgba(234, 0, 255, 0.521);
            border-style: ridge;
            box-shadow: 0 0 10px rgb(40, 240, 0),
                0 0 20px rgb(179, 255, 0),
                0 0 30px rgb(0, 128, 38);
        }

        button.secondary {
            background: gray;
            color: white;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            margin-top: 40px;
        }

        /* ===== DARK MODE ===== */
        #toggle:checked~main .card {
            background: rgba(0, 0, 0, 0.6);
            border-color: #555;
            color: white;
        }

        #toggle:checked~main button {
            background: #222;
            color: white;
        }


        #toggle:checked~main input,
        #toggle:checked~main textarea {
            background: #333;
            color: white;
        }
           
         body:has(#toggle:checked)::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        #toggle:checked~header,
        #toggle:checked~footer {
            background: rgba(0, 0, 0, 0.8);
        }

        #toggle:checked~main button:hover {
            background: #444;
        }
    </style>
</head>

<body>
    <input type="checkbox" id="toggle">
    <header>  Cooking ng ina mo <label for="toggle" class="toggle-label"></label> </header>
    <main>
        <div class="grid"> <!-- LEFT CARD -->
            <div class="card">
                <h2>Create Account</h2>
                <form id="chef-form">
                    <div class="row">

                        <div> <label>First Name</label> <input type="text" placeholder="Cozu" required> </div>
                        <div> <label>Last Name</label> <input type="text" placeholder="Villanueva" required> </div>
                    </div>
                    <label>Email Address</label> <input type="email" placeholder="email@example.com" required>
                    <label>Password</label> <input type="password" placeholder="••••••••••••••••" required>
                    <label>Date of Birth</label> <input type="date" required >
                    <label>Phone Number</label><input type="tel" placeholder="09xxxxxxx" required >

                    <label>Cooking Level</label>
                    <div class="radio-group">
                        <label><input type="radio" name="lvl" required >Beginner</label>
                        <label><input type="radio" name="lvl" required >Intermediate</label>
                        <label><input type="radio" name="lvl" required >Professional</label>
                    </div>

                    <label>Share a short introduction about yourself as a chef</label>
                    <textarea id="bio" name="bio" rows="4"
                        placeholder="Tell us your experience, passion, and cooking specialty..." required ></textarea>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms">
                        <label for="terms" >I agree to the Terms and Conditions</label>
                    </div>

                    <div class="btns">
                        <button type="button"
                            onclick="alert('You have successfully created an account!');location.href='login rec.html';">
                            Save & Submit
                        </button>
                        
                        <button type="button" class="secondary"
                            onclick="document.getElementById('chef-form').reset()">Clear Form</button>
                    </div>
                </form>


            </div> <!-- RIGHT CARD -->
            <div class="card">
                <h2>Kitchen Preferences & Statistics</h2>
                <label>Personal Food Blog</label> <input type="url" placeholder="https://myblog.com">
                <label>Preferred Cooking Session</label> <input type="datetime-local">
                <label>Average Servings</label> <input type="number" min="1" max="100">
                <label>Daily Reminders</label> <input type="time">
                <label>Kitchen Theme Color</label> <input type="color">
                <label>Quick Search</label> <input type="search">
                <label>Recipe Difficulty Tolerance</label> <input type="range" min="0" max="10">
                <label>Upload Chef Profile Picture</label> <input type="file">
                <div class="btns"> <button>Save Preferences</button>
                    <button type="button" onclick="location.href='login rec.html'"> SUBMIT </button>
                </div>
            </div>
        </div>
    </main>
    <footer> &copy; 2026 Cooking ng ina mo – Colin Villanueva </footer>
</body>

</html>

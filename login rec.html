<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="icon" href="./favicon.ico">

    <style>
        /* ===== TOGGLE BUTTON ===== */
        #toggle {
            display: none;
        }

        .toggle-label {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px;
            border-radius: 25px;
            cursor: pointer;
            background: #4e4d86ee;
            color: white;
            font-weight: bold;
            transition: .3s;
        }

        /* Default text */
        .toggle-label::after {
            content: "🌙 Dark Mode";
        }



        /* ===== BODY ===== */
        body {
            font-family: Arial, sans-serif;
            background-image: url(https://i.pinimg.com/originals/66/ad/8a/66ad8a8b3cf59cee451e53ec45ad76c3.gif);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s;
        }

        /* ===== CONTAINER ===== */
        .container {
            width: 400px;
            margin: auto;
            margin-top: 9%;
            background: rgba(63, 129, 173, 0.39);
            padding: 45px;
            border-style: inset;
            border-radius: 20px;
            border-width: 10px;
            backdrop-filter: blur(15px);
            height: 50vh;
            transition: .4s;
        }

        /* ===== LOGIN FORM ===== */
        .login-form {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            margin-left: 9%;
        }

        input {
            margin-top: 5px;
            margin-left: 8%;
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            transition: .3s;
        }

        button {
            background: #4e4d86cb;
            color: black;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            width: 40%;
            margin-left: 30%;
            padding: 10px;
            border-radius: 20px;
            transition: .3s;
        }

        button:hover {
            background-color: rgba(234, 0, 255, 0.521);
            border-style: ridge;
            box-shadow: 0 0 10px rgb(40, 240, 0),
                0 0 20px rgb(179, 255, 0),
                0 0 30px rgb(0, 128, 38);
        }

        a {
            text-align: center;
            color: rgb(4, 0, 223);
        }

        p {
            text-align: center;
        }

        /* ===== DARK MODE ===== */
        #toggle:checked~.container {
            background: rgba(0, 0, 0, 0.6);
            border-color: #555;
            color: white;
        }

        #toggle:checked~.container input {
            background: #333;
            color: white;
        }

        #toggle:checked~.container button {
            background: #222;
            color: white;
        }

        #toggle:checked+.toggle-label::after {
            content: "☀ Light Mode";
        }

        body:has(#toggle:checked)::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            /* dark overlay */
            z-index: -1;
            /* para nasa likod ang GIF at content */
        }
    </style>
</head>

<body>
    <!-- DARK/LIGHT TOGGLE -->
    <input type="checkbox" id="toggle">
    <label for="toggle" class="toggle-label"></label>

    <!-- LOGIN FORM -->
    <div class="container">
        <div class="login-form">
            <h2>Login</h2>

            <form action="Index.html">

                <label>Username</label>
                <input type="email" placeholder="email@example.com" required>

                <label>Password</label>
                <input type="password" placeholder="••••••••••••••••" required>

                <button type="submit">Login</button>

            </form>

            <p>New? <a href="sign up.html"> Create Account </a></p>
        </div>
    </div>
</body>

</html>
